# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zui5walkthroughyxs
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://my201252.s4hana.sapcloud.cn/
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZWALKTHROUG_YXS
          package: ZSAPUI5_YXS
          transport: ''
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
